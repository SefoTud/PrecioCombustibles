<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precio Combustibles</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/simple/512/2ecc71/gas-pump.png">
    <meta name="theme-color" content="#27ae60">
    
    <link rel="manifest" href="manifest.json">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado correctamente'))
                    .catch(err => console.log('Error al registrar SW', err));
            });
        }
    </script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #121212; 
        }
        
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        iframe {
            position: absolute;
            top: 0px; 
            left: 0;
            width: 100%;
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbyB-xCUtvticDey4cDwNQWSmne7hFEYa-jhJcuyaQX1leGyNUyHLY9C8EG4pWbdCRpT/exec" allow="geolocation"></iframe>
    </div>

    <div id="installBanner" style="position: fixed; bottom: 10px; left: 10px; right: 10px; background: #2c3e50; color: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none; align-items: center; justify-content: space-between; z-index: 9999; font-family: sans-serif; font-size: 14px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="https://img.icons8.com/simple/192/2ecc71/gas-pump.png" style="width: 40px; height: 40px;">
            <span>¡Usa <b>Combustibles</b> como App!<br><small>Más rápida, a pantalla completa.</small></span>
        </div>
        <button id="installBtn" style="background: #27ae60; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px;">INSTALAR</button>
    </div>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');

        // Escucha el evento oficial del navegador que permite la instalación
        window.addEventListener('beforeinstallprompt', (e) => {
            // Evita que el navegador muestre su propio aviso automático
            e.preventDefault();
            // Guarda el evento para lanzarlo cuando toquemos nuestro botón
            deferredPrompt = e;
            // Mostramos nuestro banner verde
            installBanner.style.display = 'flex';
        });

        // Qué pasa al hacer clic en nuestro botón
        installBtn.addEventListener('click', async () => {
            installBanner.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log('Resultado de la instalación:', outcome);
                deferredPrompt = null;
            }
        });

        // Si la app se instala con éxito, ocultamos el banner por si acaso
        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
        });
    </script>

</body>
</html>
