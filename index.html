<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precio Combustibles</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/gas-station.png">
    <meta name="theme-color" content="#27ae60">
    
    <link rel="manifest" href="manifest.json">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrado'))
                    .catch(err => console.log('Error SW', err));
            });
        }
    </script>
    
    <style>
        /* Quitamos todos los márgenes */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita que se pueda hacer scroll general */
            background-color: #121212; /* Color de fondo por si carga lento */
        }
        
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Iframe a pantalla completa */
        iframe {
            position: absolute;
            top: 0px; 
            left: 0;
            width: 100%;
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbyB-xCUtvticDey4cDwNQWSmne7hFEYa-jhJcuyaQX1leGyNUyHLY9C8EG4pWbdCRpT/exec" allow="geolocation"></iframe>
    </div>

    <div id="installBanner" style="position: fixed; bottom: 10px; left: 10px; right: 10px; background: #2c3e50; color: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none; align-items: center; justify-content: space-between; z-index: 9999; font-family: sans-serif; font-size: 14px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="https://img.icons8.com/color/192/gas-station.png" style="width: 40px; height: 40px;">
            <span>¡Usa <b>Combustibles</b> como App!<br><small>Más rápida y a pantalla completa.</small></span>
        </div>
        <button id="installBtn" style="background: #27ae60; color: #fff; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px;">INSTALAR</button>
    </div>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');

        // Detectamos si la App ya está instalada
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        // Si NO está instalada, mostramos el banner directamente (sin esperar al navegador)
        if (!isStandalone) {
            installBanner.style.display = 'flex';

            // Si el navegador es "amable" (como Chrome), guardamos su evento automático
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
            });

            // Qué pasa al hacer clic en INSTALAR
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    // Si estamos en Chrome, lanzamos el instalador oficial
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        installBanner.style.display = 'none';
                    }
                    deferredPrompt = null;
                } else {
                    // Si estamos en Brave, Safari o Firefox (Navegadores estrictos)
                    alert("Tu navegador bloquea las instalaciones automáticas.\n\nPara instalarla ahora mismo:\n1. Toca el menú de tu navegador (los 3 puntitos o el botón de compartir).\n2. Elige 'Instalar aplicación' o 'Añadir a pantalla de inicio'.");
                }
            });

            // Si detecta que se acaba de instalar, oculta el banner
            window.addEventListener('appinstalled', () => {
                installBanner.style.display = 'none';
            });
        }
    </script>

</body>
</html>
